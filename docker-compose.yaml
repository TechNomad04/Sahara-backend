version: '3.9'

services:

  db:
    image: postgres:14
    container_name: postgres_db
    restart: always
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:7
    container_name: redis-cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - cache:/data
    networks:
      - app-network

  backend:
    build:
      context: .
    container_name: backend_app
    restart: always
    depends_on:
      - db
      - redis
    env_file:
      - ./.env
    ports:
      - "8080:8080"
    networks:
      - app-network

networks:
  app-network:

volumes:
  pgdata:
  cache: